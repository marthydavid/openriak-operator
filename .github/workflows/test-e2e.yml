name: E2E Tests

on:
  push:
  pull_request:

env:
  # Stable tag derived from the commit SHA — the same value used by build-operator.yml.
  # Kind loads the image from a local tar, so no registry push is needed.
  IMG: ghcr.io/marthydavid/openriak-operator:sha-${{ github.sha }}

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  # Build the operator image once and export it as a tar artifact so the e2e job
  # tests the exact same binary that would be shipped — not a second rebuild.
  build:
    name: Build operator image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '~1.22'

      - name: Build image (local platform only)
        uses: docker/build-push-action@v7
        with:
          context: .
          # Single-arch for speed; multi-arch is handled by build-operator.yml on push/tag.
          platforms: linux/amd64
          push: false
          tags: ${{ env.IMG }}
          outputs: type=docker,dest=/tmp/operator-image.tar
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: operator-image
          path: /tmp/operator-image.tar
          retention-days: 1

  # ── E2E ──────────────────────────────────────────────────────────────────────
  # Download the image artifact, load it into a Kind cluster, and run the suite.
  e2e:
    name: Run e2e suite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '~1.22'

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Create Kind cluster
        run: kind create cluster --name e2e

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: operator-image
          path: /tmp

      - name: Load image into Kind
        run: |
          docker load < /tmp/operator-image.tar
          kind load docker-image ${{ env.IMG }} --name e2e

      - name: Pre-pull Riak operand image into Kind
        # Pull the Riak image on the host and load it into Kind so the StatefulSet
        # pods don't need to hit the registry during the test — avoids timeouts
        # on the Ready-phase checks that wait for Riak to actually start.
        run: |
          docker pull ghcr.io/marthydavid/riak:3.2.6
          kind load docker-image ghcr.io/marthydavid/riak:3.2.6 --name e2e

      - name: Run e2e tests
        env:
          IMG: ${{ env.IMG }}
          E2E_LOG_DIR: /tmp/e2e-logs
          # Prometheus isn't exercised by any test; cert-manager is required by the
          # mTLS suite, so BeforeSuite installs it (skips install if already present).
          PROMETHEUS_INSTALL_SKIP: "true"
        run: |
          go mod tidy
          make test-e2e

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-logs-${{ github.run_id }}
          path: /tmp/e2e-logs/
          retention-days: 7
