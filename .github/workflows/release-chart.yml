name: Helm Chart

on:
  push:
    # Chart releases are cut by tagging: chart-v<chart version>, e.g. chart-v0.1.0.
    # The tag version must match charts/openriak-operator/Chart.yaml .version.
    tags: ["chart-v*"]
  pull_request:
    paths:
      - "charts/**"
      - ".github/workflows/release-chart.yml"

jobs:
  lint:
    name: Lint chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint charts/openriak-operator

      - name: Render templates (defaults)
        run: helm template smoke charts/openriak-operator > /dev/null

      - name: Render templates (all toggles flipped)
        run: |
          helm template smoke charts/openriak-operator \
            --set metrics.serviceMonitor.enabled=true \
            --set replicaCount=2 > /dev/null
          helm template smoke charts/openriak-operator \
            --set metrics.enabled=false \
            --set leaderElection.enabled=false \
            --set rbac.create=false \
            --set serviceAccount.create=false > /dev/null

  release:
    name: Publish chart to GHCR
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/chart-v')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Verify tag matches Chart.yaml version
        run: |
          tag_version="${GITHUB_REF_NAME#chart-v}"
          chart_version=$(awk '/^version:/ {print $2}' charts/openriak-operator/Chart.yaml)
          if [ "$tag_version" != "$chart_version" ]; then
            echo "Tag chart-v$tag_version does not match Chart.yaml version $chart_version" >&2
            exit 1
          fi

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package and push
        run: |
          helm package charts/openriak-operator -d /tmp/chart
          helm push /tmp/chart/openriak-operator-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
