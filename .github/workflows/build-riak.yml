name: Build Riak Image

on:
  push:
    branches: [main]
    tags: ['riak-*']
    paths:
      - 'images/riak/**'
  pull_request:
    branches: [main]
    paths:
      - 'images/riak/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Riak version from Dockerfile
        id: riak-ver
        run: |
          ver=$(grep '^ARG RIAK_VERSION=' images/riak/Dockerfile | cut -d= -f2)
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/marthydavid/riak
          tags: |
            type=raw,value=${{ steps.riak-ver.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=match,pattern=riak-(.*),group=1

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: images/riak
          # Riak RPM is x86_64 only; no arm64 build available from tiot.jp
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
