name: Build Riak Image

on:
  push:
    branches: [main]
    tags: ['riak-*']
    paths:
      - 'images/riak/**'
      - '.github/workflows/build-riak.yml'
  pull_request:
    branches: [main]
    paths:
      - 'images/riak/**'
      - '.github/workflows/build-riak.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push ${{ matrix.riak_version }} (el${{ matrix.rhel_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Upstream ships each Riak release for specific RHEL majors only;
      # series/OTP/RHEL must match the version (see images/riak/Dockerfile).
      matrix:
        include:
          - riak_series: "3.2"
            riak_version: "3.2.6"
            riak_otp: OTP24
            rhel_version: "8"
            is_default: true
          - riak_series: "3.4"
            riak_version: "3.4.0"
            riak_otp: OTP26
            rhel_version: "9"
            is_default: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/marthydavid/riak
          tags: |
            type=raw,value=${{ matrix.riak_version }}
            # `latest` follows the default (3.2.x) variant on main only.
            type=raw,value=latest,enable=${{ matrix.is_default && github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: images/riak
          # Riak RPMs are x86_64 only; no arm64 build available from tiot.jp
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RIAK_SERIES=${{ matrix.riak_series }}
            RIAK_VERSION=${{ matrix.riak_version }}
            RIAK_OTP=${{ matrix.riak_otp }}
            RHEL_VERSION=${{ matrix.rhel_version }}
          cache-from: type=gha,scope=riak-${{ matrix.riak_version }}
          cache-to: type=gha,mode=max,scope=riak-${{ matrix.riak_version }}
