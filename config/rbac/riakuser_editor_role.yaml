# permissions for end users to edit riakusers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agents-riak-operator-kubernetes-lifecycle
    app.kubernetes.io/managed-by: kustomize
  name: riakuser-editor-role
rules:
- apiGroups:
  - riak.openriak.io
  resources:
  - riakusers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - riak.openriak.io
  resources:
  - riakusers/status
  verbs:
  - get
