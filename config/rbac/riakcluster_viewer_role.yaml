# permissions for end users to view riakclusters.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agents-riak-operator-kubernetes-lifecycle
    app.kubernetes.io/managed-by: kustomize
  name: riakcluster-viewer-role
rules:
- apiGroups:
  - riak.openriak.io
  resources:
  - riakclusters
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - riak.openriak.io
  resources:
  - riakclusters/status
  verbs:
  - get
