# RiakUsers authenticate with mTLS client certificates only: the operator asks
# cert-manager to issue a certificate whose CommonName equals spec.username,
# which is what Riak matches for certificate auth. The issuer should chain to
# the same CA as the cluster's issuer (see 2-prod-cluster.yaml) so the node
# trusts the client certificate.
apiVersion: riak.openriak.io/v1
kind: RiakUser
metadata:
  name: app-user
  namespace: default
spec:
  clusterName: riak-cluster-dev
  username: appuser
  certificateRef:
    issuerRef:
      name: riak-ca-issuer
      kind: Issuer            # Issuer or ClusterIssuer
    # secretName is optional; defaults to <riakuser-name>-client-tls
  grants:
    - resource: any
      permission: read
    - resource: any
      permission: write
