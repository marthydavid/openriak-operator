# Minimal cert-manager Certificate CRD for envtest only.
# The controller manages Certificates as unstructured objects, so a schema that
# preserves unknown fields is enough to exercise create/get paths in tests.
# Not part of the operator's deployable manifests.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificates.cert-manager.io
spec:
  group: cert-manager.io
  names:
    kind: Certificate
    listKind: CertificateList
    plural: certificates
    singular: certificate
    shortNames:
      - cert
      - certs
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          x-kubernetes-preserve-unknown-fields: true
